services:
  backend:
    build: .
    command: uvicorn backend.main:app --host 0.0.0.0 --port ${BACKEND_PORT:-8000}
    env_file: .env
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    volumes:
      - .:/app
      - /tmp/cinemaclip:/tmp/cinemaclip
    working_dir: /app

  bot:
    build: .
    command: python -m bot.bot
    env_file: .env
    restart: unless-stopped
    volumes:
      - .:/app
      - /tmp/cinemaclip:/tmp/cinemaclip
    working_dir: /app
